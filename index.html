<style>
body {
  margin: 0;
  font-family: "Quicksand", sans-serif;
  background: linear-gradient(to bottom, #e9c3c9, #f4eaea, #ffffff);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

#cuteCountdown {
  font-size: 0.9em;
  color: #c97c8c;
  background: rgba(255,255,255,0.7);
  padding: 6px 14px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.letter {
  width: 340px;
  padding: 30px;
  background: white;
  border-radius: 25px;
  text-align: center;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.back-img {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 55px;
  cursor: pointer;
}

.main-gif {
  width: 150px;
  display: block;
  margin: auto;
}

button {
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: #e9aeb6;
  color: white;
  cursor: pointer;
}

.choices {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.choices img {
  width: 80px;
  cursor: pointer;
  transition: 0.3s;
}

.choices img:hover {
  transform: scale(1.15);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 12px;
  justify-content: center;
}

.card {
  width: 80px;
  height: 80px;
  perspective: 600px;
  cursor: pointer;
}

.inner {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  position: relative;
}

.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
}

.front {
  background: #f4c2c2;
}

.back {
  background: white;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.back img {
  width: 55px;
}

/* LOVE BOXES */
.love-box {
  margin:10px 0;
  padding:12px;
  border-radius:15px;
  background:white; /* default white */
  cursor:pointer;
  text-align:left;
  transition:0.3s;
  display:flex;
  align-items:flex-start;
  gap:10px;
}

.love-box.open {
  background:#f4c2c2; /* pink when clicked */
}

.love-text {
  display:none;
  margin-top:5px;
  font-size:0.9em;
}

.love-box.open .love-text {
  display:block;
}

.heart {
  width:20px;
  margin-top:2px;
}
/* birthday text */
.bday-text {
  text-align: left;
  font-size: 0.95em;
  line-height: 1.6;
  margin-top: 15px;
}
@keyframes heartBounce {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.3); }
  50%  { transform: scale(0.9); }
  70%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.heart.bounce {
  animation: heartBounce 0.4s ease;
}
.bday-img {
  position: absolute;
  bottom: -60px;   /* pushes it outside */
  left: -40px;     /* pushes it outside */
  width: 120px;    /* size (change this!) */
}
#text {
  white-space: pre-line;
  text-align: left;
}
body {
  cursor: url('cursor.png'), auto;

</style>

    el.innerText = "it's time ♡";

  }

  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  el.innerText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}, 1000);

function loveItem(t, txt){

}
function toggleLove(el){
  el.classList.toggle("open");

  const heart = el.querySelector(".heart");

  if(el.classList.contains("open")){
    heart.src = "heartpink.png";
  } else {
    heart.src = "heartwhite.png";
  }

/* MINI GAME */
function miniGame(){
  let cards=["flower.png","flower.png","strawberry.png","strawberry.png","boba.png","boba.png"];
  cards.sort(()=>0.5-Math.random());

  let first=null, second=null, lock=false, matches=0;

  document.getElementById("content").innerHTML=`
    <div class="letter">
      <img class="back-img" src="back.png" onclick="showOptions()">
      <h2 style="font-size:15px; margin-top:30px;">
  lets play a lil game before your surprise ♡
</h2>
      <div class="grid" id="grid"></div>
    </div>
  `;

  const grid=document.getElementById("grid");

  cards.forEach(src=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="inner">
        <div class="front"></div>
        <div class="back"><img src="${src}"></div>
      </div>
    `;

    card.onclick=()=>{
      if(lock || card.classList.contains("flipped")) return;

      card.classList.add("flipped");

      if(!first){
        first={card,src};
        return;
      }

      second={card,src};
      lock=true;

      if(first.src===second.src){
        matches++;
        first=null;
        second=null;
        lock=false;

        if(matches===3){
          gameDone=true;
          confetti({colors:["#ffc0cb","#ffffff"]});

          document.body.insertAdjacentHTML("beforeend",`
            <div id="popup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.2);display:flex;justify-content:center;align-items:center;z-index:999;">
              <div style="background:white;padding:25px;border-radius:20px;text-align:center;width:260px;">
                <img src="https://media.giphy.com/media/VFUJLSxV2kfqfP44IE/giphy.gif" style="width:120px;">
                <h3>good job babyyy ♡</h3>
                <button onclick="closePopup()">continue</button>
              </div>
            </div>
          `);
        }

      } else {
        setTimeout(()=>{
          first.card.classList.remove("flipped");
          second.card.classList.remove("flipped");
          first=null;
          second=null;
          lock=false;
        },700);
      }
    };

    grid.appendChild(card);
  });
}

function closePopup(){
  document.getElementById("popup")?.remove();
}

const trailCanvas = document.createElement("canvas");
trailCanvas.style.position = "fixed";
trailCanvas.style.top = 0;
trailCanvas.style.left = 0;
trailCanvas.style.pointerEvents = "none";
trailCanvas.style.zIndex = 9999;
document.body.appendChild(trailCanvas);

const ctx = trailCanvas.getContext("2d");

trailCanvas.width = window.innerWidth;
trailCanvas.height = window.innerHeight;

let particles = [];

document.addEventListener("mousemove", (e) => {
  particles.push({
    x: e.clientX,
    y: e.clientY,
    size: Math.random() * 6 + 2,
    alpha: 1
  });
});

function animateTrail() {
  ctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);

  particles.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 182, 193, ${p.alpha})`;
    ctx.fill();

    p.alpha -= 0.02;
    p.size *= 0.95;

    if (p.alpha <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animateTrail);
}

animateTrail();
</script>
